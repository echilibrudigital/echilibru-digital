<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecționare...</title>
    <style>
        /* ===================================================
           ECHILIBRU DIGITAL - PAGINA REDIRECTIONARE (REORGANIZAT)
           ===================================================
           Pagina intermediara: verifica accesul si
           redirectioneaza catre cursul corespunzator
           =================================================== */

        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #532b66 0%, #1c1c1c 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .loader {
            text-align: center;
            color: white;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: #cc91e6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="loader">
        <div class="spinner"></div>
        <p>Redirecționare către cursul tău...</p>
    </div>

    <!-- ===================================================
         JAVASCRIPT - Verificare acces si redirect
         =================================================== -->
    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/(codul meu)';

        (async function () {
            try {
                const email = localStorage.getItem('userEmail');
                const parola = localStorage.getItem('userParola');

                if (!email || !parola) { window.location.href = '/accesare'; return; }

                const url = `${SCRIPT_URL}?action=verificaAcces&email=${encodeURIComponent(email)}&parola=${encodeURIComponent(parola)}`;
                const response = await fetch(url);
                const data = await response.json();

                if (!data.acces) { window.location.href = '/accesare'; return; }

                const areAccesCurs1 = data.acces_curs1 || data.acces_pachet;
                const areAccesCurs2 = data.acces_curs2 || data.acces_pachet;

                if (areAccesCurs1 && areAccesCurs2) {
                    window.location.href = '/alege-curs';
                } else if (areAccesCurs1) {
                    window.location.href = '/testul-sincer';
                } else if (areAccesCurs2) {
                    window.location.href = '/lectia1';
                } else {
                    window.location.href = '/accesare';
                }
            } catch (error) {
                console.error('Eroare verificare acces:', error);
                window.location.href = '/';
            }
        })();
    </script>
</body>

</html>
